<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-label="Analysis pipeline: scan, detect frameworks, parse, extract facts, resolve imports, build graph, run rules, report">
  <defs>
    <style>
      .lbl { font: 600 15px -apple-system,'Segoe UI',Inter,sans-serif; }
      .cap { font: 400 12px -apple-system,'Segoe UI',Inter,sans-serif; fill:#6B7F78; }
      .ttl { font: 700 18px -apple-system,'Segoe UI',Inter,sans-serif; fill:#24423A; }
    </style>
    <marker id="arw" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0l6 3-6 3z" fill="#8FD8C0"/>
    </marker>
  </defs>
  <rect width="1200" height="220" fill="#F8F9F8"/>
  <text x="40" y="46" class="ttl">Analysis pipeline</text>

  <!-- stages -->
  <g>
    <!-- row of 7 stages -->
    <g transform="translate(40,80)">
      <rect width="140" height="60" rx="12" fill="#EAF4EF" stroke="#8FD8C0"/>
      <text x="70" y="30" text-anchor="middle" class="lbl" fill="#24423A">scan</text>
      <text x="70" y="48" text-anchor="middle" class="cap">ignore-aware walk</text>
    </g>
    <line x1="182" y1="110" x2="204" y2="110" stroke="#8FD8C0" stroke-width="2" marker-end="url(#arw)"/>
    <g transform="translate(206,80)">
      <rect width="140" height="60" rx="12" fill="#EAF4EF" stroke="#8FD8C0"/>
      <text x="70" y="30" text-anchor="middle" class="lbl" fill="#24423A">parse</text>
      <text x="70" y="48" text-anchor="middle" class="cap">Tree-sitter · cached</text>
    </g>
    <line x1="348" y1="110" x2="370" y2="110" stroke="#8FD8C0" stroke-width="2" marker-end="url(#arw)"/>
    <g transform="translate(372,80)">
      <rect width="140" height="60" rx="12" fill="#EAF4EF" stroke="#8FD8C0"/>
      <text x="70" y="30" text-anchor="middle" class="lbl" fill="#24423A">facts</text>
      <text x="70" y="48" text-anchor="middle" class="cap">imports · exports · env</text>
    </g>
    <line x1="514" y1="110" x2="536" y2="110" stroke="#8FD8C0" stroke-width="2" marker-end="url(#arw)"/>
    <g transform="translate(538,80)">
      <rect width="140" height="60" rx="12" fill="#EAF4EF" stroke="#8FD8C0"/>
      <text x="70" y="30" text-anchor="middle" class="lbl" fill="#24423A">resolve</text>
      <text x="70" y="48" text-anchor="middle" class="cap">tsconfig · aliases</text>
    </g>
    <line x1="680" y1="110" x2="702" y2="110" stroke="#8FD8C0" stroke-width="2" marker-end="url(#arw)"/>
    <g transform="translate(704,80)">
      <rect width="140" height="60" rx="12" fill="#EAF4EF" stroke="#8FD8C0"/>
      <text x="70" y="30" text-anchor="middle" class="lbl" fill="#24423A">graph</text>
      <text x="70" y="48" text-anchor="middle" class="cap">SCC · reachability</text>
    </g>
    <line x1="846" y1="110" x2="868" y2="110" stroke="#8FD8C0" stroke-width="2" marker-end="url(#arw)"/>
    <g transform="translate(870,80)">
      <rect width="140" height="60" rx="12" fill="#EAF4EF" stroke="#8FD8C0"/>
      <text x="70" y="30" text-anchor="middle" class="lbl" fill="#24423A">rules</text>
      <text x="70" y="48" text-anchor="middle" class="cap">11 · evidence-first</text>
    </g>
    <line x1="1012" y1="110" x2="1034" y2="110" stroke="#8FD8C0" stroke-width="2" marker-end="url(#arw)"/>
    <g transform="translate(1036,80)">
      <rect width="140" height="60" rx="12" fill="#24423A"/>
      <text x="70" y="30" text-anchor="middle" class="lbl" fill="#F8F9F8">report</text>
      <text x="70" y="48" text-anchor="middle" class="cap" fill="#8FD8C0">+ scorecard</text>
    </g>
  </g>
  <text x="40" y="190" class="cap">Deterministic and cache-accelerated — warm output is byte-identical to a cold run.</text>
</svg>
