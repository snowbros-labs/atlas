<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Snowbros Atlas — deterministic engineering intelligence for JavaScript and TypeScript">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1B17"/>
      <stop offset="1" stop-color="#24423A"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8FD8C0"/>
      <stop offset="1" stop-color="#B7E9D6"/>
    </linearGradient>
    <style>
      .h { font: 700 74px -apple-system,'Segoe UI',Inter,sans-serif; fill:#F8F9F8; }
      .t { font: 400 34px -apple-system,'Segoe UI',Inter,sans-serif; fill:#B7C9C2; }
      .k { font: 600 26px 'SF Mono','Cascadia Code',Consolas,monospace; fill:#8FD8C0; }
      .s { font: 700 40px -apple-system,'Segoe UI',Inter,sans-serif; fill:#F8F9F8; }
      .sl { font: 400 22px -apple-system,'Segoe UI',Inter,sans-serif; fill:#8FB3A6; }
    </style>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="6" fill="url(#mint)"/>

  <!-- glyph -->
  <g transform="translate(96,96) scale(4.6)">
    <g stroke="#8FD8C0" stroke-width="1.4" stroke-linecap="round" fill="none">
      <path d="M12 3v18M4.2 7.5l15.6 9M19.8 7.5l-15.6 9"/>
    </g>
    <circle cx="12" cy="12" r="3" fill="#8FD8C0"/>
  </g>

  <text x="232" y="150" class="h">Snowbros Atlas</text>
  <text x="234" y="205" class="t">Deterministic engineering intelligence for JS / TS</text>

  <text x="96" y="330" class="k">$ npx snowbros analyze</text>

  <!-- stat tiles -->
  <g transform="translate(96,392)">
    <rect x="0" y="0" width="352" height="150" rx="16" fill="#12241F" stroke="#2E5147"/>
    <text x="28" y="66" class="s">Same code in</text>
    <text x="28" y="112" class="sl">same findings out — every run</text>
  </g>
  <g transform="translate(464,392)">
    <rect x="0" y="0" width="352" height="150" rx="16" fill="#12241F" stroke="#2E5147"/>
    <text x="28" y="66" class="s">~34 ms</text>
    <text x="28" y="112" class="sl">incremental, per changed file</text>
  </g>
  <g transform="translate(832,392)">
    <rect x="0" y="0" width="352" height="150" rx="16" fill="#12241F" stroke="#2E5147"/>
    <text x="28" y="66" class="s">Evidence</text>
    <text x="28" y="112" class="sl">every finding, a proof chain</text>
  </g>

  <text x="1184" y="602" text-anchor="end" class="sl">github.com/snowbros-labs/atlas</text>
</svg>
