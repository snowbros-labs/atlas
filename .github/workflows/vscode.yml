name: VS Code Extension

on:
  push:
    branches: [master, main]
    paths:
      - "vscode/**"
      - ".github/workflows/vscode.yml"
  pull_request:
    paths:
      - "vscode/**"
      - ".github/workflows/vscode.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: vscode

jobs:
  build-test:
    name: Build, lint & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check-types

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Headless VS Code needs a virtual display on Linux.
      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Test (Windows / macOS)
        if: runner.os != 'Linux'
        run: npm test

  package:
    name: Package .vsix
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: snowbros-atlas-vsix
          path: vscode/snowbros-atlas.vsix
          if-no-files-found: error
