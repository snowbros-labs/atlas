name: VS Code Release

on:
  push:
    tags:
      - "vscode-v[0-9]+.[0-9]+.[0-9]+*"

defaults:
  run:
    working-directory: vscode

permissions:
  contents: write

jobs:
  release:
    name: Package, publish & release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check-types

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npm run package

      - name: Verify package.json version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#vscode-v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath snowbros-atlas.vsix --pat "$VSCE_PAT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Snowbros Atlas VS Code Extension ${{ github.ref_name }}" \
            --notes "VS Code extension release. See vscode/DEVELOPMENT.md for details." \
            snowbros-atlas.vsix
