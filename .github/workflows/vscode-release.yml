name: VS Code Release

on:
  push:
    tags:
      - "vscode-v[0-9]+.[0-9]+.[0-9]+*"

defaults:
  run:
    working-directory: vscode

permissions:
  contents: write

jobs:
  release:
    name: Package, publish & release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check-types

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npm run package

      - name: Verify VSIX exists
        run: |
          pwd
          ls -la
          find .. -name "*.vsix"
          test -f snowbros-atlas.vsix

      - name: Verify package.json version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#vscode-v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath snowbros-atlas.vsix --pat "$VSCE_PAT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VSIX="$(find . -name '*.vsix' | head -n1)"
          if [ -z "$VSIX" ]; then
            echo "ERROR: No VSIX file found."
            exit 1
          fi
          echo "Using VSIX: $VSIX"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$VSIX" --clobber
          else
            gh release create "$TAG" "$VSIX" \
              --title "Snowbros Atlas VS Code Extension $TAG" \
              --notes "VS Code extension release. See vscode/DEVELOPMENT.md for details."
          fi
