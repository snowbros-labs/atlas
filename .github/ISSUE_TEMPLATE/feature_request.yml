name: Feature request
description: Propose a new capability, output format, or workflow improvement.
title: "[feature]: "
labels: ["C-enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Proposing a **new rule**? Please read
        [docs/adding-a-rule.md](https://github.com/snowbros-labs/atlas/blob/master/docs/adding-a-rule.md)
        first — it
        describes the determinism, evidence, and false-positive bar every rule
        must clear. Rule proposals are very welcome when they meet that bar.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and discussions for this idea.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What can't you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Snowbros Atlas to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, existing tools, or workarounds you tried.
    validations:
      required: false
  - type: checkboxes
    id: determinism
    attributes:
      label: Determinism check
      description: Snowbros Atlas only ships findings it can prove, reproducibly.
      options:
        - label: >
            This proposal can produce deterministic, evidence-backed results
            (same code in, same findings out) — or I'm flagging that it can't.
          required: false
