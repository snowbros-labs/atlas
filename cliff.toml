# git-cliff configuration — generates CHANGELOG.md from conventional
# commits. Run: `npx git-cliff -o CHANGELOG.md` (or `git cliff` if
# installed). The release workflow reads the current version's section
# for GitHub Release notes.

[changelog]
header = """
# Changelog

All notable changes to SNOWBROS Inspector are documented here.
The format follows [Keep a Changelog](https://keepachangelog.com) and the
project adheres to [Semantic Versioning](https://semver.org).
"""
body = """
{% if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"

commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^docs", group = "<!-- 3 -->Documentation" },
    { message = "^refactor", group = "<!-- 4 -->Refactoring" },
    { message = "^test", group = "<!-- 5 -->Testing" },
    { message = "^ci|^build", group = "<!-- 6 -->CI & Build" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "<!-- 7 -->Miscellaneous" },
    { message = ".*", group = "<!-- 7 -->Miscellaneous" },
]
