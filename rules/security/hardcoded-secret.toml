id = "security/hardcoded-secret"
title = "Possible hardcoded secret"
category = "security"
severity = "high"
confidence = "likely"
maturity = "preview"
description = "Detects string literals that look like credentials: well-known token prefixes (sk_live_, ghp_, AKIA, xoxb-, PEM headers) or long literals assigned to credential-named bindings."
rationale = "Secrets committed to source live forever in git history and ship in every bundle. Rotation is the only fix once exposed."
recommendation = "Move the value to an environment variable (and .env into .gitignore), then rotate the exposed credential."
false_positives = "Name-based matches can hit random ids; they report at medium/possible. Placeholders (example, changeme, your-*) and test/fixture files are excluded. Findings show only a 4-character redacted preview."
references = ["https://owasp.org/Top10/A05_2021-Security_Misconfiguration/"]
tags = ["secrets", "credentials", "cwe-798"]

[[bad_examples]]
code = "const stripe = \"sk_live_...\""
note = "Live Stripe secret key prefix."

[[bad_examples]]
code = "const apiToken = \"zz91jf02mfkw88ax\""
note = "Credential-named binding with an opaque literal."

[[good_examples]]
code = "const stripe = process.env.STRIPE_KEY"
note = "Secret comes from the environment."

[[good_examples]]
code = "const password = \"your-password-here\""
note = "Placeholder values are ignored."
